motor_bridge_node:
  ros__parameters:
    # Serial — STM32 Nucleo via USB (ST-LINK VCP)
    # Nucleo F446RE onboard ST-LINK mem-bridge USART2 ke USB.
    # Colok kabel USB dari Nucleo ke Raspberry Pi → muncul /dev/ttyACM0.
    # Pastikan user masuk group dialout: sudo usermod -aG dialout $USER
    serial_port: /dev/ttyACM0
    serial_baudrate: 115200
    serial_timeout_s: 0.01
    serial_boot_wait_s: 0.5
    serial_sync_max_attempts: 2000
    # Set true only if you must force-clear garbage; may drop valid bytes.
    serial_reset_buffers_on_start: false

    # Robot geometry
    wheel_radius: 0.05
    robot_radius: 0.20
    ticks_per_rev: 380
    max_rpm: 600

    # Safety
    watchdog_timeout_s: 0.5

    # Velocity clamping (Rec 2: reject impossible commands)
    # Max linear velocity the robot can physically achieve (m/s).
    # Kiwi drive: max_rpm=600, wheel_radius=0.05 → v_max = 600*2π*0.05/60 ≈ 3.14 m/s
    # Set conservatively below physical limit to avoid saturation.
    max_linear_velocity: 2.0     # m/s
    max_angular_velocity: 10.0   # rad/s

    # Odometry covariance (Rec 1: dead-reckoning uncertainty growth)
    # k_xy:    translational variance per meter traveled (m²/m)
    # k_theta: rotational variance per radian rotated (rad²/rad)
    # These are tuning parameters — increase if odom drifts significantly.
    odom_k_xy: 0.01
    odom_k_theta: 0.02

    # Serial reconnect (Rec 4: auto-reconnect on USB disconnect)
    # Interval in seconds between reconnect attempts when serial is down.
    serial_reconnect_interval_s: 5.0

    # Frames
    odom_frame_id: odom
    base_frame_id: base_link

    # Topics
    cmd_vel_topic: /cmd_vel
    encoder_ticks_topic: /encoder_ticks
    imu_raw_topic: /imu_raw
    imu_data_topic: /imu/data
    odom_topic: /odom

    # Service
    reset_odom_service: /reset_odom
